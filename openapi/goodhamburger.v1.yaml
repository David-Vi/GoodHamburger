openapi: 3.0.3
info:
  title: Good Hamburger API
  version: v1
  description: |
    Contrato versionado da API Good Hamburger.
    Este arquivo funciona como referência de design e integração para consumidores da API.
servers:
  - url: http://localhost:5000
security:
  - ApiKeyAuth: []
tags:
  - name: Menu
  - name: Orders
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    CreateOrderRequest:
      type: object
      required:
        - menuItemIds
      properties:
        menuItemIds:
          type: array
          minItems: 1
          maxItems: 3
          items:
            type: integer
            format: int32
    OrderItemResponse:
      type: object
      required:
        - menuItemId
        - name
        - unitPrice
        - category
      properties:
        menuItemId:
          type: integer
          format: int32
        name:
          type: string
        unitPrice:
          type: number
          format: decimal
        category:
          type: string
    OrderResponse:
      type: object
      required:
        - id
        - status
        - items
        - subtotal
        - discountRate
        - discountAmount
        - total
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
        subtotal:
          type: number
          format: decimal
        discountRate:
          type: number
          format: decimal
        discountAmount:
          type: number
          format: decimal
        total:
          type: number
          format: decimal
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MenuItemResponse:
      type: object
      required:
        - id
        - name
        - price
        - category
      properties:
        id:
          type: integer
          format: int32
        name:
          type: string
        price:
          type: number
          format: decimal
        category:
          type: string
    ProblemResponse:
      type: object
      required:
        - type
        - title
        - status
        - detail
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        traceId:
          type: string
paths:
  /api/v1/menu:
    get:
      tags: [Menu]
      summary: Lista o cardápio público.
      security: []
      responses:
        '200':
          description: Cardápio retornado com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItemResponse'
  /api/v1/orders:
    get:
      tags: [Orders]
      summary: Lista todos os pedidos.
      responses:
        '200':
          description: Lista de pedidos.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          description: API key ausente ou inválida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
    post:
      tags: [Orders]
      summary: Cria um novo pedido.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Pedido criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: API key ausente ou inválida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Item do cardápio inexistente.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '422':
          description: Requisição inválida ou regra de negócio violada.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
  /api/v1/orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Orders]
      summary: Busca um pedido por identificador.
      responses:
        '200':
          description: Pedido encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: API key ausente ou inválida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Pedido não encontrado.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
    put:
      tags: [Orders]
      summary: Substitui os itens de um pedido.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Pedido atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '401':
          description: API key ausente ou inválida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Pedido não encontrado.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '422':
          description: Requisição inválida ou regra de negócio violada.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
    delete:
      tags: [Orders]
      summary: Remove um pedido.
      responses:
        '204':
          description: Pedido removido com sucesso.
        '401':
          description: API key ausente ou inválida.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'
        '404':
          description: Pedido não encontrado.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemResponse'

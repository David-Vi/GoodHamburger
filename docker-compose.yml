version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: src/GoodHamburger.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    restart: unless-stopped

  blazor:
    build:
      context: .
      dockerfile: src/GoodHamburger.Blazor/Dockerfile
    ports:
      - "5001:80"
    depends_on:
      - api
    restart: unless-stopped
